<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Users</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css"
          integrity="sha384-MCw98/SFnGE8fJT3GXwEOngsV7Zt27NXFoaoApmYm81iuXoPkFOJwJ8ERdknLPMO" crossorigin="anonymous">
    <th:block th:replace="~{fragments/header :: appHead}"></th:block>
    <link rel="stylesheet" href="/css/management.css">
</head>
<body>
<th:block th:replace="~{fragments/header :: appHeader}"></th:block>
<div class="container-fluid mgmt-container">
    <div class="mgmt-header">
        <h1 class="mgmt-title">Users</h1>
    </div>
    <div class="table-responsive">
        <table class="table mgmt-table">
            <thead>
                <tr>
                    <th>First Name</th>
                    <th>Last Name</th>
                    <th>Email</th>
                    <th>Role</th>
                    <th class="col-actions">Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="user, stat : ${users}">
                    <td th:text="${user.firstname}"></td>
                    <td th:text="${user.lastname}"></td>
                    <td th:text="${user.email}"></td>
                    <td>
                        <select class="mgmt-role-select"
                                name="role"
                                th:attr="form='user-form-' + ${stat.index}, data-original=${user.role}"
                                onchange="onRoleChange(this)">
                            <option th:each="role : ${roles}"
                                    th:value="${role}"
                                    th:text="${role}"
                                    th:selected="${role == user.role}"></option>
                        </select>
                    </td>
                    <td class="col-actions">
                        <button type="submit"
                                th:attr="form='user-form-' + ${stat.index}"
                                class="btn-row-edit"
                                disabled>Update</button>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(users)}">
                    <td colspan="5" class="mgmt-empty">No users found.</td>
                </tr>
            </tbody>
        </table>
    </div>

    <!-- One hidden form per user row, linked via the HTML5 form attribute -->
    <form th:each="user, stat : ${users}"
          th:id="'user-form-' + ${stat.index}"
          th:action="@{/api/auth/user/{email}(email=${user.email})}"
          method="post"
          style="display:none">
        <input type="hidden" name="_method" value="PUT">
    </form>
</div>
<script>
    function onRoleChange(selectEl) {
        const original = selectEl.dataset.original;
        const formId = selectEl.getAttribute('form');
        const btn = document.querySelector(`button[form="${formId}"]`);
        btn.disabled = selectEl.value === original;
    }
</script>
</body>
</html>
