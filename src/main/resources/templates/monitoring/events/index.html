<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Event History</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css"
          integrity="sha384-MCw98/SFnGE8fJT3GXwEOngsV7Zt27NXFoaoApmYm81iuXoPkFOJwJ8ERdknLPMO" crossorigin="anonymous">
    <th:block th:replace="~{fragments/header :: appHead}"></th:block>
    <link rel="stylesheet" href="/css/management.css">
</head>
<body>
<th:block th:replace="~{fragments/header :: appHeader}"></th:block>
<div class="container-fluid mgmt-container">
    <div class="mgmt-header">
        <h1 class="mgmt-title">Event History</h1>
        <div class="mgmt-header-controls">
            <label class="mgmt-size-label" for="pageSize">Show</label>
            <select id="pageSize" class="mgmt-size-select" onchange="changePageSize(this.value)">
                <option value="10" th:selected="${eventList.size == 10}">10</option>
                <option value="20" th:selected="${eventList.size == 20}">20</option>
                <option value="50" th:selected="${eventList.size == 50}">50</option>
            </select>
            <label class="mgmt-size-label" for="pageSize">per page</label>
        </div>
    </div>
    <div class="table-responsive">
        <table class="table mgmt-table">
            <thead>
                <tr>
                    <th>
                        <a class="sort-link"
                           th:href="@{/api/monitoring/event(page=0,size=${eventList.size},sort=${'id,' + (sortField == 'id' ? (sortDir == 'asc' ? 'desc' : 'asc') : 'asc')})}">
                            ID
                            <span class="sort-icon" th:if="${sortField == 'id'}" th:text="${sortDir == 'asc' ? '↑' : '↓'}"></span>
                            <span class="sort-icon sort-icon-inactive" th:if="${sortField != 'id'}">↕</span>
                        </a>
                    </th>
                    <th>
                        <a class="sort-link"
                           th:href="@{/api/monitoring/event(page=0,size=${eventList.size},sort=${'eventType,' + (sortField == 'eventType' ? (sortDir == 'asc' ? 'desc' : 'asc') : 'asc')})}">
                            Event Type
                            <span class="sort-icon" th:if="${sortField == 'eventType'}" th:text="${sortDir == 'asc' ? '↑' : '↓'}"></span>
                            <span class="sort-icon sort-icon-inactive" th:if="${sortField != 'eventType'}">↕</span>
                        </a>
                    </th>
                    <th>
                        <a class="sort-link"
                           th:href="@{/api/monitoring/event(page=0,size=${eventList.size},sort=${'queueName,' + (sortField == 'queueName' ? (sortDir == 'asc' ? 'desc' : 'asc') : 'asc')})}">
                            Queue Name
                            <span class="sort-icon" th:if="${sortField == 'queueName'}" th:text="${sortDir == 'asc' ? '↑' : '↓'}"></span>
                            <span class="sort-icon sort-icon-inactive" th:if="${sortField != 'queueName'}">↕</span>
                        </a>
                    </th>
                    <th>
                        <a class="sort-link"
                           th:href="@{/api/monitoring/event(page=0,size=${eventList.size},sort=${'timestamp,' + (sortField == 'timestamp' ? (sortDir == 'asc' ? 'desc' : 'asc') : 'asc')})}">
                            Timestamp
                            <span class="sort-icon" th:if="${sortField == 'timestamp'}" th:text="${sortDir == 'asc' ? '↑' : '↓'}"></span>
                            <span class="sort-icon sort-icon-inactive" th:if="${sortField != 'timestamp'}">↕</span>
                        </a>
                    </th>
                    <th>Event Content</th>
                    <th class="col-actions">Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="entry : ${eventList.content}">
                    <td class="col-id" th:text="${entry.id}"></td>
                    <td th:text="${entry.eventType}"></td>
                    <td th:text="${entry.queueName}"></td>
                    <td th:text="${entry.timestamp}"></td>
                    <td th:text="${entry.eventContent}"></td>
                    <td class="col-actions">
                        <form th:action="@{/api/monitoring/event/delete/{id}(id=${entry.id})}" method="post" class="d-inline">
                            <input type="hidden" name="_method" value="DELETE">
                            <button type="submit" class="btn-row-delete">Delete</button>
                        </form>
                    </td>
                </tr>
                <tr th:if="${eventList.totalElements == 0}">
                    <td colspan="6" class="mgmt-empty">No entries found.</td>
                </tr>
            </tbody>
        </table>
    </div>
    <div class="mgmt-pagination">
        <span class="mgmt-pagination-info"
              th:text="|Page ${eventList.number + 1} of ${eventList.totalPages} &mdash; ${eventList.totalElements} entries|"></span>
        <div class="mgmt-pagination-controls">
            <a class="btn-page"
               th:classappend="${eventList.first} ? ' disabled'"
               th:href="@{/api/monitoring/event(page=${eventList.number - 1},size=${eventList.size},sort=${sortField + ',' + sortDir})}">Previous</a>
            <a class="btn-page"
               th:classappend="${eventList.last} ? ' disabled'"
               th:href="@{/api/monitoring/event(page=${eventList.number + 1},size=${eventList.size},sort=${sortField + ',' + sortDir})}">Next</a>
        </div>
    </div>
</div>
<script>
    function changePageSize(size) {
        const url = new URL(window.location.href);
        url.searchParams.set('size', size);
        url.searchParams.set('page', '0');
        window.location.href = url.toString();
    }
</script>
</body>
</html>
