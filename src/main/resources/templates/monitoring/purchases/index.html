<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Contracts</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css"
          integrity="sha384-MCw98/SFnGE8fJT3GXwEOngsV7Zt27NXFoaoApmYm81iuXoPkFOJwJ8ERdknLPMO" crossorigin="anonymous">
    <th:block th:replace="~{fragments/header :: appHead}"></th:block>
    <link rel="stylesheet" href="/css/management.css">
</head>
<body>
<th:block th:replace="~{fragments/header :: appHeader}"></th:block>
<div class="container mgmt-container">
    <div class="mgmt-header">
        <h1 class="mgmt-title">Contracts</h1>
        <a href="/api/contract/add" class="btn-mgmt-add">+ Add New</a>
    </div>
    <div class="table-responsive">
        <table class="table mgmt-table">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Supplier ID</th>
                    <th>Begin Date</th>
                    <th>End Date</th>
                    <th>Fuels</th>
                    <th>Transports</th>
                    <th class="col-actions">Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="contract : ${contracts}">
                    <td class="col-id" th:text="${contract.id}"></td>
                    <td class="col-id" th:text="${contract.supplierId}"></td>
                    <td th:text="${contract.beginDate}"></td>
                    <td th:text="${contract.endDate}"></td>
                    <td th:text="${contract.fuelIds}"></td>
                    <td th:text="${contract.transportIds}"></td>
                    <td class="col-actions">
                        <a th:href="@{/api/contract/view/edit/{id}(id=${contract.id})}" class="btn-row-edit">Edit</a>
                        <button class="btn-row-delete"
                                th:onclick="'deleteEntry(\'' + ${contract.id} + '\')'">Delete</button>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(contracts)}">
                    <td colspan="7" class="mgmt-empty">No contracts found.</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
<script>
function deleteEntry(uuid) {
    if (!confirm('Delete this contract?')) return;
    fetch('/api/contract/delete/' + uuid, { method: 'DELETE' })
        .then(function(r) { if (r.ok) location.reload(); else alert('Delete failed: ' + r.status); });
}
</script>
</body>
</html>
