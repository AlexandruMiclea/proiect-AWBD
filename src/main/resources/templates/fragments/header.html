<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.w3.org/1999/xhtml" lang="en">
<head>
    <th:block th:fragment="appHead">
        <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="/css/app.css">
    </th:block>
</head>
<body>
<th:block th:fragment="appHeader">

    <header class="app-header">
        <a href="/" class="header-logo">
            <img src="/images/main_logo.png" alt="Reptopetrol">
        </a>
        <div class="header-right">
            <div class="header-user">
                <span>Logged in as</span>
                <span class="header-user-name" th:text="${username}">User</span>
            </div>
            <form th:action="@{/api/auth/logout}" method="post">
                <button type="submit" class="btn-logout">Logout</button>
            </form>
            <button class="hamburger-btn" id="hamburgerBtn" aria-label="Toggle menu" aria-expanded="false">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </div>
    </header>
    <div class="drawer-overlay" id="drawerOverlay"></div>
    <nav class="nav-drawer" id="navDrawer" aria-label="Management navigation">
        <div class="nav-drawer-section">Management</div>
        <a sec:authorize="hasRole('ROLE_OPERATIONAL') or hasRole('ROLE_MANAGER') or hasRole('ROLE_ADMIN')" th:href="@{/api/fuelSupply/all}"  class="nav-link">Fuel Supplies</a>
        <a sec:authorize="hasRole('ROLE_OPERATIONAL') or hasRole('ROLE_MANAGER') or hasRole('ROLE_ADMIN')" th:href="@{/api/fuel/all}"        class="nav-link">Fuels</a>
        <a sec:authorize="hasRole('ROLE_OPERATIONAL') or hasRole('ROLE_MANAGER') or hasRole('ROLE_ADMIN')" th:href="@{/api/station/all}"     class="nav-link">Stations</a>
        <a sec:authorize="hasRole('ROLE_OPERATIONAL') or hasRole('ROLE_ADMIN')" th:href="@{/api/contract/all}"    class="nav-link">Contracts</a>
        <a sec:authorize="hasRole('ROLE_OPERATIONAL') or hasRole('ROLE_ADMIN')" th:href="@{/api/supplier/all}"    class="nav-link">Suppliers</a>
        <a sec:authorize="hasRole('ROLE_OPERATIONAL') or hasRole('ROLE_ADMIN')" th:href="@{/api/transport/all}"   class="nav-link">Transports</a>
        <a sec:authorize="hasRole('ROLE_MANAGER') or hasRole('ROLE_ADMIN')" th:href="@{/api/employee/all}"    class="nav-link">Employees</a>
        <a sec:authorize="hasRole('ROLE_MANAGER') or hasRole('ROLE_ADMIN')" th:href="@{/api/inventory/all}"   class="nav-link">Inventories</a>
        <a sec:authorize="hasRole('ROLE_MANAGER') or hasRole('ROLE_ADMIN')" th:href="@{/api/product/all}"     class="nav-link">Products</a>
        <a sec:authorize="hasRole('ROLE_MANAGER') or hasRole('ROLE_ADMIN')" th:href="@{/api/store/all}"       class="nav-link">Stores</a>
        <a sec:authorize="hasRole('ROLE_ADMIN')" th:href="@{/api/monitoring/crud}"   class="nav-link">Monitoring CRUD</a>
        <a sec:authorize="hasRole('ROLE_ADMIN')" th:href="@{/api/users/users}"   class="nav-link">Users Manager</a>
    </nav>

    <script src="/js/header_bar.js"></script>

</th:block>
</body>
</html>
