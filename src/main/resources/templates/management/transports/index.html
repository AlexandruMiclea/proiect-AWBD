<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Transports</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css"
          integrity="sha384-MCw98/SFnGE8fJT3GXwEOngsV7Zt27NXFoaoApmYm81iuXoPkFOJwJ8ERdknLPMO" crossorigin="anonymous">
    <th:block th:replace="~{fragments/header :: appHead}"></th:block>
    <link rel="stylesheet" href="/css/management.css">
</head>
<body>
<th:block th:replace="~{fragments/header :: appHeader}"></th:block>
<div class="container mgmt-container">
    <div class="mgmt-header">
        <h1 class="mgmt-title">Transports</h1>
        <a href="/api/transport/add" class="btn-mgmt-add">+ Add New</a>
    </div>
    <div class="table-responsive">
        <table class="table mgmt-table">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Company</th>
                    <th>Contract ID</th>
                    <th>Creation Date</th>
                    <th>Completion Date</th>
                    <th>Stations</th>
                    <th class="col-actions">Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="transport : ${transports}">
                    <td class="col-id" th:text="${transport.id}"></td>
                    <td th:text="${transport.companyName}"></td>
                    <td class="col-id" th:text="${transport.contractId}"></td>
                    <td th:text="${transport.creationDate}"></td>
                    <td th:text="${transport.completionDate}"></td>
                    <td th:text="${#lists.size(transport.stationIds)}"></td>
                    <td class="col-actions">
                        <a th:href="@{/api/transport/update/{id}(id=${transport.id})}" class="btn-row-edit">Edit</a>
                        <button class="btn-row-delete"
                                th:onclick="'deleteEntry(\'' + ${transport.id} + '\')'">Delete</button>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(transports)}">
                    <td colspan="7" class="mgmt-empty">No transports found.</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
<script>
function deleteEntry(uuid) {
    if (!confirm('Delete this transport?')) return;
    fetch('/api/transport/delete/' + uuid, { method: 'DELETE' })
        .then(function(r) { if (r.ok) location.reload(); else alert('Delete failed: ' + r.status); });
}
</script>
</body>
</html>
