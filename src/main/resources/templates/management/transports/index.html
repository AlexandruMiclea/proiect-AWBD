<!DOCTYPE html>
<html lang="en" xmlns:th="https://www.thymeleaf.org/">
<head>
    <meta charset="UTF-8">
    <title>Transports</title>
    <link rel="stylesheet"
          href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css"
          integrity="sha384-MCw98/SFnGE8fJT3GXwEOngsV7Zt27NXFoaoApmYm81iuXoPkFOJwJ8ERdknLPMO"
          crossorigin="anonymous">
    <th:block th:replace="~{fragments/header :: appHead}"></th:block>
</head>
<body>
<th:block th:replace="~{fragments/header :: appHeader}"></th:block>
<div class="container my-2" align="center">

    <h3>transport List</h3>
    <a th:href="@{/addnew}" class="btn btn-primary btn-sm mb-3">Add transport</a>
    <table style="width:80%" border="1"
           class="table table-striped table-responsive-md">
        <thead>
        <tr>
            <th>Name</th>
            <th>Address</th>
            <th>Action</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="transport:${transports}">
            <td th:text="${transport.companyName}"></td>
            <td th:text="${transport.creationDate}"></td>
            <td th:text="${transport.completionDate}"></td>
            <!--        <td th:text="${transport.address}"></td>-->
            <!--        <td> <a th:href="@{/showFormForUpdate/{id}(id=${transport.id})}"-->
            <!--                class="btn btn-primary">Update</a>-->
            <!--                <a th:href="@{/deleteEmployee/{id}(id=${transport.id})}"-->
            <!--                class="btn btn-danger">Delete</a>-->
            <!--    </td>-->
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
