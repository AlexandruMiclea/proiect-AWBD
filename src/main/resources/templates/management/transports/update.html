<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Edit Transport</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css"
          integrity="sha384-MCw98/SFnGE8fJT3GXwEOngsV7Zt27NXFoaoApmYm81iuXoPkFOJwJ8ERdknLPMO" crossorigin="anonymous">
    <th:block th:replace="~{fragments/header :: appHead}"></th:block>
    <link rel="stylesheet" href="/css/management.css">
    <link rel="stylesheet" href="/css/management-form.css">
</head>
<body>
<th:block th:replace="~{fragments/header :: appHeader}"></th:block>
<div class="container mgmt-container">
    <div class="mgmt-header">
        <h1 class="mgmt-title">Edit Transport</h1>
        <a href="/api/transport/all" class="btn-row-edit">← Back</a>
    </div>
    <div class="form-container">
        <div class="form-card">
            <form class="mgmt-form"
                  th:action="@{/api/transport/update/{id}(id=${transportCreationDto.id})}"
                  data-method="PUT"
                  data-success-url="/api/transport/all">
                <div class="form-error"></div>
                <input type="hidden" name="id" th:value="${transportCreationDto.id}">
                <div class="form-group">
                    <label for="contractId">Contract ID</label>
                    <input type="text" id="contractId" name="contractId" class="form-control mgmt-input"
                           required th:value="${transportCreationDto.contractId}">
                </div>
                <div class="form-group">
                    <label for="stationIds">Station IDs</label>
                    <input type="text" id="stationIds" name="stationIds" class="form-control mgmt-input"
                           required placeholder="UUID1, UUID2, ..."
                           data-type="array"
                           th:value="${transportCreationDto.stationIds != null ? #strings.listJoin(transportCreationDto.stationIds, ', ') : ''}">
                    <small class="field-hint">Comma-separated list of station UUIDs.</small>
                </div>
                <div class="form-group">
                    <label for="companyName">Company Name</label>
                    <input type="text" id="companyName" name="companyName" class="form-control mgmt-input"
                           maxlength="128" required
                           th:value="${transportCreationDto.companyName}">
                </div>
                <div class="form-group">
                    <label for="creationDate">Creation Date</label>
                    <input type="text" id="creationDate" name="creationDate"
                           class="form-control mgmt-input" required
                           placeholder="e.g. 2024-01-15T10:30:00Z"
                           th:value="${transportCreationDto.creationDate}">
                    <small class="field-hint">ISO 8601 format, e.g. 2024-01-15T10:30:00Z</small>
                </div>
                <div class="form-group">
                    <label for="completionDate">Completion Date <span class="field-hint" style="display:inline">(optional)</span></label>
                    <input type="text" id="completionDate" name="completionDate"
                           class="form-control mgmt-input"
                           placeholder="e.g. 2024-06-30T18:00:00Z"
                           th:value="${transportCreationDto.completionDate}">
                    <small class="field-hint">ISO 8601 format, e.g. 2024-06-30T18:00:00Z</small>
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn-form-submit">Save Changes</button>
                    <a href="/api/transport/all" class="btn-form-cancel">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>
<script src="/js/management-form.js"></script>
</body>
</html>
