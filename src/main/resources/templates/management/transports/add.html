<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Add Transport</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css"
          integrity="sha384-MCw98/SFnGE8fJT3GXwEOngsV7Zt27NXFoaoApmYm81iuXoPkFOJwJ8ERdknLPMO" crossorigin="anonymous">
    <th:block th:replace="~{fragments/header :: appHead}"></th:block>
    <link rel="stylesheet" href="/css/management.css">
    <link rel="stylesheet" href="/css/management-form.css">
</head>
<body>
<th:block th:replace="~{fragments/header :: appHeader}"></th:block>
<div class="container mgmt-container">
    <div class="mgmt-header">
        <h1 class="mgmt-title">Add Transport</h1>
        <a href="/api/transport/all" class="btn-row-edit">← Back</a>
    </div>
    <div class="form-container">
        <div class="form-card">
            <form class="mgmt-form"
                  action="/api/transport/add"
                  method="post"
                  data-success-url="/api/transport/all">
                <div class="form-error"></div>
                <div class="form-group">
                    <label for="contractId">Contract ID</label>
                    <select id="contractId" name="contractId" class="form-control mgmt-input" required>
                        <option value="" disabled selected>Select contact</option>
                        <option th:each="contract : ${contracts}" th:value="${contract.getId()}" th:text="${contract.getId()}"></option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="stationIds">Stations</label>
                    <select id="stationIds" name="stationIds" class="form-control mgmt-input" required multiple>
                        <option th:each="station : ${stations}" th:value="${station.id}" th:text="${station.name}"></option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="companyName">Company Name</label>
                    <input type="text" id="companyName" name="companyName" class="form-control mgmt-input"
                           maxlength="128" required placeholder="Transport company name">
                </div>
                <div class="form-group">
                    <label for="creationDate">Creation Date</label>
                    <input type="datetime-local" id="creationDate" name="creationDate"
                           class="form-control mgmt-input" required data-type="instant">
                </div>
                <div class="form-group">
                    <label for="completionDate">Completion Date <span class="field-hint" style="display:inline">(optional)</span></label>
                    <input type="datetime-local" id="completionDate" name="completionDate"
                           class="form-control mgmt-input" data-type="instant">
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn-form-submit">Create Transport</button>
                    <a href="/api/transport/all" class="btn-form-cancel">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>
<script src="/js/management-form.js"></script>
</body>
</html>
