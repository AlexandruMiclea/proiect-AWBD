<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Stores</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css"
          integrity="sha384-MCw98/SFnGE8fJT3GXwEOngsV7Zt27NXFoaoApmYm81iuXoPkFOJwJ8ERdknLPMO" crossorigin="anonymous">
    <th:block th:replace="~{fragments/header :: appHead}"></th:block>
    <link rel="stylesheet" href="/css/management.css">
</head>
<body>
<th:block th:replace="~{fragments/header :: appHeader}"></th:block>
<div class="container mgmt-container">
    <div class="mgmt-header">
        <h1 class="mgmt-title">Stores</h1>
        <a href="/api/store/add" class="btn-mgmt-add">+ Add New</a>
    </div>
    <div class="table-responsive">
        <table class="table mgmt-table">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Station ID</th>
                    <th class="col-actions">Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="store : ${stores}">
                    <td class="col-id" th:text="${store.id}"></td>
                    <td class="col-id" th:text="${store.stationId}"></td>
                    <td class="col-actions">
                        <a th:href="@{/api/store/update/{id}(id=${store.id})}" class="btn-row-edit">Edit</a>
                        <button class="btn-row-delete"
                                th:onclick="'deleteEntry(\'' + ${store.id} + '\')'">Delete</button>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(stores)}">
                    <td colspan="3" class="mgmt-empty">No stores found.</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
<script>
function deleteEntry(uuid) {
    if (!confirm('Delete this store?')) return;
    fetch('/api/store/delete/' + uuid, { method: 'DELETE' })
        .then(function(r) { if (r.ok) location.reload(); else alert('Delete failed: ' + r.status); });
}
</script>
</body>
</html>
