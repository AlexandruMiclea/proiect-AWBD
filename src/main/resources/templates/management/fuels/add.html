<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Add Fuel</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css"
          integrity="sha384-MCw98/SFnGE8fJT3GXwEOngsV7Zt27NXFoaoApmYm81iuXoPkFOJwJ8ERdknLPMO" crossorigin="anonymous">
    <th:block th:replace="~{fragments/header :: appHead}"></th:block>
    <link rel="stylesheet" href="/css/management.css">
    <link rel="stylesheet" href="/css/management-form.css">
</head>
<body>
<th:block th:replace="~{fragments/header :: appHeader}"></th:block>
<div class="container mgmt-container">
    <div class="mgmt-header">
        <h1 class="mgmt-title">Add Fuel</h1>
        <a href="/api/fuel/all" class="btn-row-edit">← Back</a>
    </div>
    <div class="form-container">
        <div class="form-card">
            <form class="mgmt-form"
                  action="/api/fuel/add"
                  method="post"
                  data-success-url="/api/fuel/all">
                <div class="form-error"></div>
                <div class="form-group">
                    <label for="name">Name</label>
                    <input type="text" id="name" name="name" class="form-control mgmt-input"
                           maxlength="64" required placeholder="Fuel name">
                </div>
                <div class="form-group">
                    <label for="type">Type</label>
                    <select id="type" name="type" class="form-control mgmt-input" required>
                        <option value="" disabled selected>Select type</option>
                        <option value="GAS">GAS</option>
                        <option value="DIESEL">DIESEL</option>
                        <option value="LPG">LPG</option>
                    </select>
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn-form-submit">Create Fuel</button>
                    <a href="/api/fuel/all" class="btn-form-cancel">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>
<script src="/js/management-form.js"></script>
</body>
</html>
