<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Inventories</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css"
          integrity="sha384-MCw98/SFnGE8fJT3GXwEOngsV7Zt27NXFoaoApmYm81iuXoPkFOJwJ8ERdknLPMO" crossorigin="anonymous">
    <th:block th:replace="~{fragments/header :: appHead}"></th:block>
    <link rel="stylesheet" href="/css/management.css">
</head>
<body>
<th:block th:replace="~{fragments/header :: appHeader}"></th:block>
<div class="container mgmt-container">
    <div class="mgmt-header">
        <h1 class="mgmt-title">Inventories</h1>
        <a href="/api/inventory/add" class="btn-mgmt-add">+ Add New</a>
    </div>
    <div class="table-responsive">
        <table class="table mgmt-table">
            <thead>
                <tr>
                    <th>Store ID</th>
                    <th>Product ID</th>
                    <th>Quantity</th>
                    <th>Price</th>
                    <th>Price Change</th>
                    <th class="col-actions">Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="inv : ${inventories}">
                    <td class="col-id" th:text="${inv.id.storeId}"></td>
                    <td class="col-id" th:text="${inv.id.productId}"></td>
                    <td th:text="${inv.quantity}"></td>
                    <td th:text="${inv.price}"></td>
                    <td th:text="${inv.priceChange}"></td>
                    <td class="col-actions">
                        <a th:href="@{/api/inventory/update(storeId=${inv.id.storeId},productId=${inv.id.productId})}"
                           class="btn-row-edit">Edit</a>
                        <form th:action="@{/api/inventory/delete(storeId=${inv.id.storeId},productId=${inv.id.productId})}" method="post" class="d-inline">
                          <input type="hidden" name="_method" value="DELETE">
                          <button type="submit" class="btn-row-delete">Delete</button>
                        </form>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(inventories)}">
                    <td colspan="6" class="mgmt-empty">No inventory entries found.</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
