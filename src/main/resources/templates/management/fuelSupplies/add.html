<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Add Fuel Supply</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css"
          integrity="sha384-MCw98/SFnGE8fJT3GXwEOngsV7Zt27NXFoaoApmYm81iuXoPkFOJwJ8ERdknLPMO" crossorigin="anonymous">
    <th:block th:replace="~{fragments/header :: appHead}"></th:block>
    <link rel="stylesheet" href="/css/management.css">
    <link rel="stylesheet" href="/css/management-form.css">
</head>
<body>
<th:block th:replace="~{fragments/header :: appHeader}"></th:block>
<div class="container mgmt-container">
    <div class="mgmt-header">
        <h1 class="mgmt-title">Add Fuel Supply</h1>
        <a href="/api/fuelSupply/all" class="btn-row-edit">← Back</a>
    </div>
    <div class="form-container">
        <div class="form-card">
            <form class="mgmt-form"
                  action="/api/fuelSupply/add"
                  method="post"
                  data-success-url="/api/fuelSupply/all">
                <div class="form-error"></div>
                <div class="form-group">
                    <label for="id_stationId">Station ID</label>
                    <select id="id_stationId" name="id.stationId" class="form-control mgmt-input" required>
                        <option value="" disabled selected>Select station</option>
                        <option th:each="station : ${stations}" th:value="${station.getId()}" th:text="${station.getName()}"></option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="id_fuelId">Fuel ID</label>
                    <select id="id_fuelId" name="id.fuelId" class="form-control mgmt-input" required>
                        <option value="" disabled selected>Select fuel</option>
                        <option th:each="fuel : ${fuels}" th:value="${fuel.getId()}" th:text="${fuel.getName()}"></option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="quantity">Quantity</label>
                    <input type="number" id="quantity" name="quantity" class="form-control mgmt-input"
                           min="0.01" step="0.01" required placeholder="Volume in stock"
                           data-type="number">
                </div>
                <div class="form-group">
                    <label for="price">Price</label>
                    <input type="number" id="price" name="price" class="form-control mgmt-input"
                           min="0.01" step="0.01" required placeholder="Price per unit"
                           data-type="number">
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn-form-submit">Create Fuel Supply</button>
                    <a href="/api/fuelSupply/all" class="btn-form-cancel">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>
<script src="/js/management-form.js"></script>
</body>
</html>
