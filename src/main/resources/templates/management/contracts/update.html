<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Edit Contract</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css"
          integrity="sha384-MCw98/SFnGE8fJT3GXwEOngsV7Zt27NXFoaoApmYm81iuXoPkFOJwJ8ERdknLPMO" crossorigin="anonymous">
    <th:block th:replace="~{fragments/header :: appHead}"></th:block>
    <link rel="stylesheet" href="/css/management.css">
    <link rel="stylesheet" href="/css/management-form.css">
</head>
<body>
<th:block th:replace="~{fragments/header :: appHeader}"></th:block>
<div class="container mgmt-container">
    <div class="mgmt-header">
        <h1 class="mgmt-title">Edit Contract</h1>
        <a href="/api/contract/all" class="btn-row-edit">← Back</a>
    </div>
    <div class="form-container">
        <div class="form-card">
            <form class="mgmt-form"
                  th:action="@{/api/contract/update/{id}(id=${contractCreationDto.id})}"
                  data-method="PUT"
                  data-success-url="/api/contract/all">
                <div class="form-error"></div>
                <input type="hidden" name="id" th:value="${contractCreationDto.id}">
                <div class="form-group">
                    <label for="supplierId">Supplier ID</label>
                    <input type="text" id="supplierId" name="supplierId" class="form-control mgmt-input"
                           required th:value="${contractCreationDto.supplierId}">
                </div>
                <div class="form-group">
                    <label for="fuelIds">Fuel IDs</label>
                    <input type="text" id="fuelIds" name="fuelIds" class="form-control mgmt-input"
                           required placeholder="UUID1, UUID2, ..."
                           data-type="array"
                           th:value="${contractCreationDto.fuelIds != null ? #strings.listJoin(contractCreationDto.fuelIds, ', ') : ''}">
                    <small class="field-hint">Comma-separated list of fuel UUIDs.</small>
                </div>
                <div class="form-group">
                    <label for="beginDate">Begin Date</label>
                    <input type="text" id="beginDate" name="beginDate"
                           class="form-control mgmt-input" required
                           placeholder="e.g. 2024-01-15T10:30:00Z"
                           th:value="${contractCreationDto.beginDate}">
                    <small class="field-hint">ISO 8601 format, e.g. 2024-01-15T10:30:00Z</small>
                </div>
                <div class="form-group">
                    <label for="endDate">End Date</label>
                    <input type="text" id="endDate" name="endDate"
                           class="form-control mgmt-input" required
                           placeholder="e.g. 2025-12-31T23:59:59Z"
                           th:value="${contractCreationDto.endDate}">
                    <small class="field-hint">ISO 8601 format, e.g. 2025-12-31T23:59:59Z</small>
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn-form-submit">Save Changes</button>
                    <a href="/api/contract/all" class="btn-form-cancel">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>
<script src="/js/management-form.js"></script>
</body>
</html>
