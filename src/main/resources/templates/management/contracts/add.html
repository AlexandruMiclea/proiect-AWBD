<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Add Contract</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css"
          integrity="sha384-MCw98/SFnGE8fJT3GXwEOngsV7Zt27NXFoaoApmYm81iuXoPkFOJwJ8ERdknLPMO" crossorigin="anonymous">
    <th:block th:replace="~{fragments/header :: appHead}"></th:block>
    <link rel="stylesheet" href="/css/management.css">
    <link rel="stylesheet" href="/css/management-form.css">
</head>
<body>
<th:block th:replace="~{fragments/header :: appHeader}"></th:block>
<div class="container mgmt-container">
    <div class="mgmt-header">
        <h1 class="mgmt-title">Add Contract</h1>
        <a href="/api/contract/all" class="btn-row-edit">← Back</a>
    </div>
    <div class="form-container">
        <div class="form-card">
            <form class="mgmt-form"
                  action="/api/contract/add"
                  method="post"
                  data-success-url="/api/contract/all">
                <div class="form-error"></div>
                <div class="form-group">
                    <label for="supplierId">Supplier</label>
                    <select id="supplierId" name="supplierId" class="form-control mgmt-input" required>
                        <option value="" disabled selected>Select supplier</option>
                        <option th:each="supplier : ${suppliers}" th:value="${supplier.getId()}" th:text="${supplier.getName()}"></option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="fuelIds">Fuels</label>
                    <select id="fuelIds" name="fuelIds" class="form-control mgmt-input" required multiple>
                        <option th:each="fuel : ${fuels}" th:value="${fuel.id}" th:text="${fuel.name}"></option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="beginDate">Begin Date</label>
                    <input type="datetime-local" id="beginDate" name="beginDate"
                           class="form-control mgmt-input" required data-type="instant">
                </div>
                <div class="form-group">
                    <label for="endDate">End Date</label>
                    <input type="datetime-local" id="endDate" name="endDate"
                           class="form-control mgmt-input" required data-type="instant">
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn-form-submit">Create Contract</button>
                    <a href="/api/contract/all" class="btn-form-cancel">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>
<script src="/js/management-form.js"></script>
</body>
</html>
