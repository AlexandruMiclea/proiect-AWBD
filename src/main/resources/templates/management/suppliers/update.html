<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Edit Supplier</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css"
          integrity="sha384-MCw98/SFnGE8fJT3GXwEOngsV7Zt27NXFoaoApmYm81iuXoPkFOJwJ8ERdknLPMO" crossorigin="anonymous">
    <th:block th:replace="~{fragments/header :: appHead}"></th:block>
    <link rel="stylesheet" href="/css/management.css">
    <link rel="stylesheet" href="/css/management-form.css">
</head>
<body>
<th:block th:replace="~{fragments/header :: appHeader}"></th:block>
<div class="container mgmt-container">
    <div class="mgmt-header">
        <h1 class="mgmt-title">Edit Supplier</h1>
        <a href="/api/supplier/all" class="btn-row-edit">← Back</a>
    </div>
    <div class="form-container">
        <div class="form-card">
            <form class="mgmt-form"
                  th:action="@{/api/supplier/update/{id}(id=${supplierCreationDto.id})}"
                  data-method="PUT"
                  data-success-url="/api/supplier/all">
                <div class="form-error"></div>
                <input type="hidden" name="id" th:value="${supplierCreationDto.id}">
                <div class="form-group">
                    <label for="name">Name</label>
                    <input type="text" id="name" name="name" class="form-control mgmt-input"
                           maxlength="64" required
                           th:value="${supplierCreationDto.name}">
                </div>
                <div class="form-group">
                    <label for="address">Address</label>
                    <input type="text" id="address" name="address" class="form-control mgmt-input"
                           maxlength="128" required
                           th:value="${supplierCreationDto.address}">
                </div>
                <div class="form-group">
                    <label for="homeCountry">Country</label>
                    <input type="text" id="homeCountry" name="homeCountry" class="form-control mgmt-input"
                           maxlength="128" required
                           th:value="${supplierCreationDto.homeCountry}">
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn-form-submit">Save Changes</button>
                    <a href="/api/supplier/all" class="btn-form-cancel">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>
<script src="/js/management-form.js"></script>
</body>
</html>
