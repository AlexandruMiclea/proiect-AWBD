<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Suppliers</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css"
          integrity="sha384-MCw98/SFnGE8fJT3GXwEOngsV7Zt27NXFoaoApmYm81iuXoPkFOJwJ8ERdknLPMO" crossorigin="anonymous">
    <th:block th:replace="~{fragments/header :: appHead}"></th:block>
    <link rel="stylesheet" href="/css/management.css">
</head>
<body>
<th:block th:replace="~{fragments/header :: appHeader}"></th:block>
<div class="container mgmt-container">
    <div class="mgmt-header">
        <h1 class="mgmt-title">Suppliers</h1>
        <a href="/api/supplier/add" class="btn-mgmt-add">+ Add New</a>
    </div>
    <div class="table-responsive">
        <table class="table mgmt-table">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Address</th>
                    <th>Country</th>
                    <th>Contracts</th>
                    <th class="col-actions">Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="supplier : ${suppliers}">
                    <td class="col-id" th:text="${supplier.id}"></td>
                    <td th:text="${supplier.name}"></td>
                    <td th:text="${supplier.address}"></td>
                    <td th:text="${supplier.homeCountry}"></td>
                    <td th:text="${supplier.contractIds}"></td>
                    <td class="col-actions">
                        <a th:href="@{/api/supplier/update/{id}(id=${supplier.id})}" class="btn-row-edit">Edit</a>
                        <button class="btn-row-delete"
                                th:onclick="'deleteEntry(\'' + ${supplier.id} + '\')'">Delete</button>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(suppliers)}">
                    <td colspan="6" class="mgmt-empty">No suppliers found.</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
<script>
function deleteEntry(uuid) {
    if (!confirm('Delete this supplier?')) return;
    fetch('/api/supplier/delete/' + uuid, { method: 'DELETE' })
        .then(function(r) { if (r.ok) location.reload(); else alert('Delete failed: ' + r.status); });
}
</script>
</body>
</html>
