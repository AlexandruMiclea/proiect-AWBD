<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Stations</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css"
          integrity="sha384-MCw98/SFnGE8fJT3GXwEOngsV7Zt27NXFoaoApmYm81iuXoPkFOJwJ8ERdknLPMO" crossorigin="anonymous">
    <th:block th:replace="~{fragments/header :: appHead}"></th:block>
    <link rel="stylesheet" href="/css/management.css">
</head>
<body>
<th:block th:replace="~{fragments/header :: appHeader}"></th:block>
<div class="container mgmt-container">
    <div class="mgmt-header">
        <h1 class="mgmt-title">Stations</h1>
        <a href="/api/station/add" class="btn-mgmt-add">+ Add New</a>
    </div>
    <div class="table-responsive">
        <table class="table mgmt-table">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Address</th>
                    <th>Pumps</th>
<!--                    <th>Store ID</th>-->
<!--                    <th>Employees</th>-->
<!--                    <th>Fuels</th>-->
                    <th class="col-actions">Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="station : ${stations}">
                    <td class="col-id" th:text="${station.id}"></td>
                    <td th:text="${station.name}"></td>
                    <td th:text="${station.address}"></td>
                    <td th:text="${station.pumpNo}"></td>
<!--                    <td class="col-id" th:text="${station.storeId}"></td>-->
<!--                    <td th:text="${#lists.size(station.employeeIds)}"></td>-->
<!--                    <td th:text="${#lists.size(station.fuelIds)}"></td>-->
                    <td class="col-actions">
                        <a th:href="@{/api/station/update/{id}(id=${station.id})}" class="btn-row-edit">Edit</a>
                        <form th:action="@{/api/station/delete/{id}(id=${station.id})}" method="post" class="d-inline">
                          <input type="hidden" name="_method" value="DELETE">
                          <button type="submit" class="btn-row-delete">Delete</button>
                        </form>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(stations)}">
                    <td colspan="8" class="mgmt-empty">No stations found.</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
