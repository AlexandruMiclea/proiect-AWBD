<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Add Station</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css"
          integrity="sha384-MCw98/SFnGE8fJT3GXwEOngsV7Zt27NXFoaoApmYm81iuXoPkFOJwJ8ERdknLPMO" crossorigin="anonymous">
    <th:block th:replace="~{fragments/header :: appHead}"></th:block>
    <link rel="stylesheet" href="/css/management.css">
    <link rel="stylesheet" href="/css/management-form.css">
</head>
<body>
<th:block th:replace="~{fragments/header :: appHeader}"></th:block>
<div class="container mgmt-container">
    <div class="mgmt-header">
        <h1 class="mgmt-title">Add Station</h1>
        <a href="/api/station/all" class="btn-row-edit">← Back</a>
    </div>
    <div class="form-container">
        <div class="form-card">
            <form class="mgmt-form"
                  action="/api/station/add"
                  method="post"
                  data-success-url="/api/station/all">
                <div class="form-error"></div>
                <div class="form-group">
                    <label for="name">Name</label>
                    <input type="text" id="name" name="name" class="form-control mgmt-input"
                           maxlength="64" required placeholder="Station name">
                </div>
                <div class="form-group">
                    <label for="address">Address</label>
                    <input type="text" id="address" name="address" class="form-control mgmt-input"
                           maxlength="128" required placeholder="Full address">
                </div>
                <div class="form-group">
                    <label for="pumpNo">Number of Pumps</label>
                    <input type="number" id="pumpNo" name="pumpNo" class="form-control mgmt-input"
                           min="1" required placeholder="Number of fuel pumps"
                           data-type="number">
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn-form-submit">Create Station</button>
                    <a href="/api/station/all" class="btn-form-cancel">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>
<script src="/js/management-form.js"></script>
</body>
</html>
