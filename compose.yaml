services:
  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: alex@pg.admin
      PGADMIN_DEFAULT_PASSWORD: password
    ports:
      - "15432:80"
  postgres:
    image: postgres:16.3
    container_name: postgres_db
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=reptopetrol
      - POSTGRES_PASSWORD=reptopetrol
      - POSTGRES_DB=reptopetrol
